<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui,-apple-system,sans-serif">
  <title>AI Corporate — How a Request Flows</title>
  <desc>A flowchart showing a user request passing through the orchestrator, being routed to agents at different cost tiers, running through pre-commit gates, and landing as a commit with docs.</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9ca3af"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#111827" letter-spacing="-0.3">AI Corporate — Request Flow</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" fill="#6b7280">From user input to verified commit</text>

  <!-- USER -->
  <rect x="350" y="62" width="200" height="38" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="83" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">User Request</text>
  <text x="450" y="96" text-anchor="middle" font-size="9" fill="#6b7280">"Add a discount code feature"</text>

  <line x1="450" y1="100" x2="450" y2="120" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ORCHESTRATOR -->
  <rect x="300" y="122" width="300" height="46" rx="8" fill="#1e1b4b" stroke="#4338ca" stroke-width="1.5"/>
  <text x="450" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e7ff">Orchestrator</text>
  <text x="450" y="158" text-anchor="middle" font-size="9" fill="#a5b4fc">reads CLAUDE.md routing table · holds all approval gates</text>

  <line x1="450" y1="168" x2="450" y2="186" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- HR ROUTER -->
  <rect x="340" y="188" width="220" height="36" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="450" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#4f46e5">Senior HR routes to cheapest tier</text>
  <text x="450" y="219" text-anchor="middle" font-size="9" fill="#818cf8">that can handle the task</text>

  <!-- Fan-out arrows to 3 tiers -->
  <path d="M390,224 Q250,240 160,272" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="224" x2="450" y2="272" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M510,224 Q650,240 740,272" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- HAIKU tier -->
  <rect x="50" y="274" width="220" height="80" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="160" y="292" text-anchor="middle" font-size="10" font-weight="700" fill="#c2410c" letter-spacing="0.5">HAIKU — WORKER</text>
  <text x="160" y="306" text-anchor="middle" font-size="9" fill="#9a3412">$0.001 / task (mechanical)</text>
  <text x="160" y="322" text-anchor="middle" font-size="9" fill="#7c2d12">• verifier · docs-scribe</text>
  <text x="160" y="335" text-anchor="middle" font-size="9" fill="#7c2d12">• grep-reporter · migration-writer</text>
  <text x="160" y="348" text-anchor="middle" font-size="9" fill="#7c2d12">• postgres-pro · accessibility</text>

  <!-- SONNET tier -->
  <rect x="340" y="274" width="220" height="80" rx="8" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5"/>
  <text x="450" y="292" text-anchor="middle" font-size="10" font-weight="700" fill="#0f766e" letter-spacing="0.5">SONNET — SPECIALIST</text>
  <text x="450" y="306" text-anchor="middle" font-size="9" fill="#134e4a">$0.015 / task (domain logic)</text>
  <text x="450" y="322" text-anchor="middle" font-size="9" fill="#134e4a">• typescript-pro · react-specialist</text>
  <text x="450" y="335" text-anchor="middle" font-size="9" fill="#134e4a">• security-auditor · devops-engineer</text>
  <text x="450" y="348" text-anchor="middle" font-size="9" fill="#134e4a">• qa-engineer · code-reviewer</text>

  <!-- OPUS tier -->
  <rect x="630" y="274" width="220" height="80" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="740" y="292" text-anchor="middle" font-size="10" font-weight="700" fill="#4338ca" letter-spacing="0.5">OPUS — SENIOR</text>
  <text x="740" y="306" text-anchor="middle" font-size="9" fill="#312e81">$0.075 / task (judgment)</text>
  <text x="740" y="322" text-anchor="middle" font-size="9" fill="#312e81">• senior-engineer · senior-planner</text>
  <text x="740" y="335" text-anchor="middle" font-size="9" fill="#312e81">• debugger · senior-hr</text>
  <text x="740" y="348" text-anchor="middle" font-size="9" fill="#312e81">• architecture · approval authority</text>

  <text x="450" y="370" text-anchor="middle" font-size="9" fill="#9ca3af" font-style="italic">agents run in parallel · domain-exclusion guard prevents conflicts</text>

  <!-- Converge arrows back -->
  <path d="M160,354 Q250,385 420,396" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="354" x2="450" y2="396" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M740,354 Q650,385 480,396" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ORCHESTRATOR VERIFIES -->
  <rect x="310" y="398" width="280" height="36" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="418" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Orchestrator verifies output</text>
  <text x="450" y="430" text-anchor="middle" font-size="9" fill="#6b7280">checks git diff · spot-verifies evidence · re-briefs if needed</text>

  <line x1="450" y1="434" x2="450" y2="452" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PRE-COMMIT GATES -->
  <rect x="200" y="454" width="500" height="60" rx="8" fill="#fafafa" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="472" text-anchor="middle" font-size="10" font-weight="700" fill="#374151" letter-spacing="0.3">8 PRE-COMMIT GATES</text>
  <text x="280" y="488" text-anchor="middle" font-size="8.5" fill="#6b7280">① docs paired</text>
  <text x="360" y="488" text-anchor="middle" font-size="8.5" fill="#6b7280">② typecheck</text>
  <text x="440" y="488" text-anchor="middle" font-size="8.5" fill="#6b7280">③ skill fresh</text>
  <text x="520" y="488" text-anchor="middle" font-size="8.5" fill="#6b7280">④ no fake date</text>
  <text x="622" y="488" text-anchor="middle" font-size="8.5" fill="#6b7280">⑤–⑧ tests · deno · maps</text>
  <text x="450" y="504" text-anchor="middle" font-size="8.5" fill="#9ca3af" font-style="italic">advisory guidelines get ignored under token pressure · hooks enforce</text>

  <!-- Auto-escalation callout -->
  <rect x="718" y="454" width="152" height="60" rx="6" fill="#fef9ec" stroke="#fde68a" stroke-width="1"/>
  <text x="794" y="471" text-anchor="middle" font-size="8.5" font-weight="600" fill="#92400e">Auto-escalation</text>
  <text x="794" y="484" text-anchor="middle" font-size="8" fill="#78350f">2 failures → next tier</text>
  <text x="794" y="496" text-anchor="middle" font-size="8" fill="#78350f">haiku → sonnet → opus</text>
  <text x="794" y="508" text-anchor="middle" font-size="8" fill="#78350f">→ surface to user</text>

  <line x1="450" y1="514" x2="450" y2="534" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- COMMIT -->
  <rect x="310" y="536" width="280" height="42" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="450" y="556" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Commit: code + docs (same commit)</text>
  <text x="450" y="570" text-anchor="middle" font-size="9" fill="#15803d">skill-updater audits agent knowledge · deploy on approval</text>

  <!-- Legend -->
  <text x="50" y="608" font-size="9" fill="#9ca3af">■ Haiku  ■ Sonnet  ■ Opus/Senior   — cost-optimized: ~40–50% savings vs all-Opus routing</text>
</svg>
